name: Build AppImage

on:
  workflow_dispatch:
    inputs:
      rpm_url:
        description: URL of the RPM to package
        required: true
        type: string
      app_name:
        description: Installed binary name (under /usr/bin in the RPM)
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    inputs:
      rpm_url:
        description: URL of the RPM to package
        required: true
        type: string
      app_name:
        description: Installed binary name (under /usr/bin in the RPM)
        required: true
        type: string

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download RPM
        run: wget -qO app.rpm "${{ inputs.rpm_url }}"

      - name: Install Podman and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman wget squashfs-tools libfuse2

      - name: Build container image
        run: |
          podman build \
          --build-arg "APP_NAME=${{ inputs.app_name }}" \
          -t rpm-appimage:build \
          -f ContainerFile \
          .

      - name: Build AppImage from image rootfs
        env:
          APP_NAME: ${{ inputs.app_name }}
          VERSION: ${{ github.run_number }}
        run: |
          chmod +x .github/scripts/build-appimage.sh
          .github/scripts/build-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: "*.AppImage"

      - name: upload to release
        uses: softprops/action-gh-release@master
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "*.AppImage"
          asset_name: ${{ inputs.app_name }}.AppImage
          asset_content_type: application/octet-stream
