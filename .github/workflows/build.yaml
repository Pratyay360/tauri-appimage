name: Build AppImage
on:
  workflow_dispatch:
    inputs:
      rpm_url:
        description: URL of the RPM to package
        required: true
        type: string
      app_name:
        description: Installed binary name (under /usr/bin in the RPM)
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download RPM
        run: wget -qO app.rpm "${{ inputs.rpm_url }}"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y docker

      - name: Build container image
        run: |
          docker build \
            --build-arg "APP_NAME=${{ inputs.app_name }}" \
            -t rpm-appimage:build \
            -f ContainerFile \
            ${{ github.workspace }}

      - name: Extract AppImage from container
        run: |
          CID=$(docker create rpm-appimage:build)
          docker cp "$CID:/output/${{ inputs.app_name }}-x86_64.AppImage" .
          docker rm "$CID"
          file "${{ inputs.app_name }}-x86_64.AppImage"
          test -x "${{ inputs.app_name }}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-appimage
          path: "${{ inputs.app_name }}-x86_64.AppImage"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: ${{ inputs.app_name }}-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
