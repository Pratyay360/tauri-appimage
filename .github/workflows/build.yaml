name: Build AppImage
on:
  workflow_dispatch:
    inputs:
      rpm_url:
        description: URL of the RPM to package
        required: true
        type: string
      app_name:
        description: Installed binary name (under /usr/bin in the RPM)
        required: true
        type: string
      app_icon_url:
        description: >-
          Fallback icon URL (PNG/SVG). Used only if the RPM does not ship its own icon.
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download RPM
        run: wget -qO app.rpm "${{ inputs.rpm_url }}"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container image
        run: |
          podman build \
            --build-arg "APP_NAME=${{ inputs.app_name }}" \
            -t rpm-appimage:build \
            -f ContainerFile \
            ${{ github.workspace }}

      - name: Extract AppImage from container
        run: |
          CID=$(podman create rpm-appimage:build)
          podman cp "$CID:/output/${{ inputs.app_name }}-x86_64.AppImage" .
          podman rm "$CID"
          # Quick validation
          file "${{ inputs.app_name }}-x86_64.AppImage"
          test -x "${{ inputs.app_name }}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-appimage
          path: "${{ inputs.app_name }}-x86_64.AppImage"
